<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries try to polyfill fetch in environments where it's read-only.
      (function() {
        try {
          const original = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return original; },
            set: function() { console.warn('Blocked attempt to override window.fetch'); },
            configurable: true
          });
        } catch (e) {
          // If locked, we can't do much but the app might still work if the library catches its own error
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
